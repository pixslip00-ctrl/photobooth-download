<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Your Photo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: sans-serif;
      gap: 20px;
    }
    h1 { color: #fff; font-size: 22px; text-align: center; font-weight: 700; }
    p  { color: #aaa; font-size: 14px; text-align: center; }
    .photos {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .photo-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 140px;
      max-width: 280px;
    }
    .photo-card img {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    }
    .photo-card img.bw { filter: grayscale(100%); }
    .label {
      color: #aaa;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      text-align: center;
    }
    .btn.bw-btn { background: #444; }
    .btn:active { opacity: 0.8; }
    .hint { color: #555; font-size: 12px; margin-top: -8px; }
    #expired { display: none; color: #f44336; font-size: 16px; text-align: center; }
    canvas { display: none; }
  </style>
</head>
<body>
  <h1>Your Photo is Ready! 🎉</h1>
  <p>Choose your preferred version</p>

  <div class="photos">
    <div class="photo-card">
      <p class="label">🎨 Colored</p>
      <!-- No crossorigin here — iOS long-press save works normally -->
      <img id="photoColor" alt="Colored photo" />
      <button class="btn" onclick="downloadColor()">⬇️ Download Color</button>
    </div>
    <div class="photo-card">
      <p class="label">⬛ Black & White</p>
      <!-- src will be replaced with actual B&W data URL after load -->
      <img id="photoBW" alt="B&W photo" />
      <button class="btn bw-btn" onclick="downloadBW()">⬇️ Download B&W</button>
    </div>
  </div>

  <p class="hint">iOS: press & hold the photo → Save to Photos</p>
  <p id="expired">⏰ This photo has expired (24 hours).</p>
  <canvas id="canvas"></canvas>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const imgUrl   = params.get('img');
    const ts       = params.get('ts');
    const colorImg = document.getElementById('photoColor');
    const bwImg    = document.getElementById('photoBW');

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    }

    // Check 24-hour expiry via timestamp in URL
    const EXPIRY_MS = 24 * 60 * 60 * 1000; // 24 hours
    if (ts && (Date.now() - parseInt(ts)) > EXPIRY_MS) {
      document.querySelectorAll('.photo-card').forEach(el => el.style.display = 'none');
      document.getElementById('expired').style.display = 'block';
    } else if (imgUrl) {
      colorImg.src = imgUrl;
      colorImg.onerror = () => {
        document.querySelectorAll('.photo-card').forEach(el => el.style.display = 'none');
        document.getElementById('expired').style.display = 'block';
      };

      // Load a hidden crossorigin copy just to generate the B&W data URL
      // Then set it as bwImg.src — so iOS long-press saves actual B&W pixels
      const helperLoad = new Image();
      helperLoad.crossOrigin = 'anonymous';
      helperLoad.onload = function() {
        try {
          const canvas  = document.getElementById('canvas');
          canvas.width  = helperLoad.naturalWidth;
          canvas.height = helperLoad.naturalHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(helperLoad, 0, 0);
          const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < data.data.length; i += 4) {
            const g = data.data[i]*0.299 + data.data[i+1]*0.587 + data.data[i+2]*0.114;
            data.data[i] = data.data[i+1] = data.data[i+2] = g;
          }
          ctx.putImageData(data, 0, 0);
          // Set actual B&W data URL — long-press on iOS saves real B&W now
          bwImg.src = canvas.toDataURL('image/jpeg', 0.92);
        } catch {
          // CORS failed — fallback to CSS filter (visual only)
          bwImg.src = imgUrl;
          bwImg.style.filter = 'grayscale(100%)';
        }
      };
      helperLoad.onerror = () => {
        bwImg.src = imgUrl;
        bwImg.style.filter = 'grayscale(100%)';
      };
      helperLoad.src = imgUrl + (imgUrl.includes('?') ? '&' : '?') + '_t=' + Date.now();
    }

    function downloadColor() {
      if (isIOS()) {
        window.open(imgUrl, '_blank');
        return;
      }
      fetch(imgUrl)
        .then(r => r.blob())
        .then(b => triggerDownload(URL.createObjectURL(b), 'photo-color.jpg'))
        .catch(() => window.open(imgUrl, '_blank'));
    }

    function downloadBW() {
      // Load a separate hidden image with crossOrigin for canvas access
      // (separate from the display img so iOS long-press still works on display img)
      const helperImg = new Image();
      helperImg.crossOrigin = 'anonymous';
      helperImg.onload = function() {
        try {
          const canvas  = document.getElementById('canvas');
          canvas.width  = helperImg.naturalWidth;
          canvas.height = helperImg.naturalHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(helperImg, 0, 0);
          const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < data.data.length; i += 4) {
            const g = data.data[i]*0.299 + data.data[i+1]*0.587 + data.data[i+2]*0.114;
            data.data[i] = data.data[i+1] = data.data[i+2] = g;
          }
          ctx.putImageData(data, 0, 0);

          if (isIOS()) {
            // Open B&W data URL in new tab → user can long-press → Save to Photos
            window.open(canvas.toDataURL('image/jpeg', 0.92), '_blank');
          } else {
            canvas.toBlob(
              b => triggerDownload(URL.createObjectURL(b), 'photo-bw.jpg'),
              'image/jpeg', 0.92
            );
          }
        } catch {
          window.open(imgUrl, '_blank');
        }
      };
      helperImg.onerror = () => window.open(imgUrl, '_blank');
      // Add timestamp to force a fresh CORS request
      helperImg.src = imgUrl + (imgUrl.includes('?') ? '&' : '?') + '_t=' + Date.now();
    }

    function triggerDownload(url, name) {
      const a = document.createElement('a');
      a.href = url; a.download = name; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
  </script>
</body>
</html>
